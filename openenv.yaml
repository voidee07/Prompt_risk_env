name: prompt-risk-env
version: "1.0.0"
description: >
  An OpenEnv environment where an AI agent classifies employee prompts 
  sent to LLMs for risk level, sensitive data types, and recommended 
  action. Models a real enterprise DLP (Data Loss Prevention) use case.

 
tags:
  - openenv
  - dlp
  - classification
  - enterprise-ai

author: Voidee07


entry_point: server/app.py

tasks:
  - id: 1
    name: Easy - Obvious PII Detection
    description: Classify prompts containing clear, explicit PII like SSNs, credit cards, passports
    max_steps: 12
    difficulty: easy

  - id: 2
    name: Medium - Multi-label Classification  
    description: Classify prompts containing multiple sensitive data types simultaneously
    max_steps: 16
    difficulty: medium

  - id: 3
    name: Hard - Subtle Confidentiality Breaches
    description: Detect confidential business information without obvious PII keywords
    max_steps: 13
    difficulty: hard

observation_space:
  type: object
  fields:
    prompt: 
      type: string
      description: The employee prompt to classify
    task_id:
      type: integer
      description: Current task number (1, 2, or 3)
    task_name:
      type: string
      description: Human readable task name
    step:
      type: integer
      description: Current step number within the episode

action_space:
  type: object
  fields:
    risk_level:
      type: string
      enum: [safe, low, medium, high, critical]
    data_types:
      type: array
      items: [PII, financial, medical, credentials, confidential_business, legal]
    recommended_action:
      type: string
      enum: [allow, warn, block, escalate]

reward:
  type: float
  range: [0.0, 1.0]
  description: >
    Composite score: 40% risk level accuracy, 40% data types F1 score,
    20% recommended action accuracy. Penalty of -0.3 for missing critical risks.

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state

docker:
  port: 7860